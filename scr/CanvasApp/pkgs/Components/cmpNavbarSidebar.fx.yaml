                PaddingBottom: =0
                PaddingLeft: =(icnBtn_Nav_2.Width + icnBtn_Nav_2.X) * 1.3
                PaddingRight: =0
                PaddingTop: =0
                PressedColor: =Color.White
                PressedFill: =RGBA(0, 0, 0, 0.15)
                RadiusBottomLeft: =5
                RadiusBottomRight: =5
                RadiusTopLeft: =5
                RadiusTopRight: =5
                Size: =cmpNavbarSidebar.FontSize
                TabIndex: =-2
                Text: =cmpNavbarSidebar.Btn2Text
                Width: =Parent.Width
                ZIndex: =3

