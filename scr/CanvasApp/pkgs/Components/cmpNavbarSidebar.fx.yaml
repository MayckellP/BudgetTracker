    tmrCloseSidebar As timer:
        Duration: =300
        Height: =38
        OnTimerStart: =Reset(tmrOpenSidebar)
        Start: =!cmpNavbarSidebar.SidebarOpened
        Visible: =false
        Width: |
            =Parent.Width
        Y: =735
        ZIndex: =3

    tmrOpenSidebar As timer:
        Duration: =300
        Height: =38
        OnTimerStart: =Reset(tmrCloseSidebar)
        Start: =cmpNavbarSidebar.SidebarOpened
        Visible: =false
        Width: =Parent.Width
        Y: =773
        ZIndex: =4

