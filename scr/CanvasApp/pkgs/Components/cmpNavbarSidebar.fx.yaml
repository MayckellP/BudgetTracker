                ZIndex: =1

            bgBtn_Nav_3 As rectangle:
                Fill: =RGBA(0, 0, 0, 0)
                Height: =Parent.Height
                HoverFill: =RGBA(0, 0, 0, 0.1)
                OnSelect: |-
