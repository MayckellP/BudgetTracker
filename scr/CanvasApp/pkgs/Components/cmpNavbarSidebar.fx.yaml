cmpNavbarSidebar As CanvasComponent:
    Close_ResetNavbarCollapsed():
        ThisProperty:
            Default: =
    BackgroundColor: =RGBA(0, 121, 107, 1)
    Btn1Enabled: =true
    Btn1Icon: =Dashboard_Selected
    Btn1IconSelected: =Dashboard_Selected
    Btn1Navigate: =App.ActiveScreen
    Btn1Text: ="Finanz Übersicht"
    Btn2Enabled: =true
    Btn2Icon: =Report_Selected
    Btn2IconSelected: =Report_Selected
    Btn2Navigate: =App.ActiveScreen
    Btn2Text: ="Berichte"
    Btn3Enabled: =true
    Btn3Icon: =Search_Selected
    Btn3IconSelected: =Search_Selected
    Btn3Navigate: =App.ActiveScreen
    Btn3Text: ="Suchen"
    CurrentActiveButton: ="Finanz Übersicht"
    Fill: =RGBA(0, 0, 0, 0)
    FontSize: =10
    Height: =App.Height
    IconSize: =25
    SidebarOpened: =
    SidebarWidth: =240
    TimerClose: =100
    TimerOpen: =100
    Width: |-
        =Switch(
            Self.SidebarOpened,
            true, App.Width,
            false, (Self.TimerClose)*1.8,
            0
        )
    X: =0
    Y: =0
    ZIndex: =2

    bg_Sidebar As rectangle:
        Fill: |-
            =Switch(
                cmpNavbarSidebar.SidebarOpened,
                true, RGBA(0, 0, 0, .5),
                false, RGBA(0, 0, 0, 0),
                RGBA(0, 0, 0, 0)
            )
        Height: =Parent.Height
        OnSelect: |
            =cmpNavbarSidebar.Close_ResetNavbarCollapsed();
        Width: |-
            =Switch(
                cmpNavbarSidebar.SidebarOpened,
                true, App.Width,
                false, - (cmpNavbarSidebar.TimerClose)*1.5,
                0
            )
        ZIndex: =1

    cntSidebar As groupContainer.horizontalAutoLayoutContainer:
        Fill: =cmpNavbarSidebar.BackgroundColor
        Height: =Parent.Height
        LayoutAlignItems: =LayoutAlignItems.Stretch
        LayoutDirection: =LayoutDirection.Vertical
        LayoutGap: =15
        LayoutGridColumnMinWidth: =0
        LayoutGridColumns: =6
        LayoutGridRowMinHeight: =0
        LayoutGridRows: =6
        LayoutMode: =LayoutMode.Auto
        maximumHeight: =11360
        maximumWidth: =640
        PaddingBottom: =22
        PaddingLeft: =10
        PaddingRight: =10
        PaddingTop: =22
        RadiusBottomLeft: =0
        RadiusBottomRight: =0
        RadiusTopLeft: =0
        RadiusTopRight: =0
        Visible: =If(Self.Width = 0, false, true)
        Width: |-
            =With(
                {
                    varExpandedSidebar: cmpNavbarSidebar.SidebarWidth * Power(tmrOpenSidebar.Value / tmrOpenSidebar.Duration, 2), //0+(OpenSidebar_Timer.Value)*0.8,
                    
                    varCollapsedSidebar: cmpNavbarSidebar.SidebarWidth * Power((tmrCloseSidebar.Duration - tmrCloseSidebar.Value) / tmrCloseSidebar.Duration, 2) //280 - (CloseSidebar_Timer.Value)*0.8
                },
                Switch(
                    cmpNavbarSidebar.SidebarOpened,
                    true, varExpandedSidebar,
                    false, varCollapsedSidebar,
                    cmpNavbarSidebar.SidebarWidth         
                )
            )
        ZIndex: =2

        cntNavBtn_1 As groupContainer.manualLayoutContainer:
            DropShadow: =DropShadow.None
            FillPortions: =0
            Height: =40
            LayoutGridColumnMinWidth: =0
            LayoutGridColumns: =6
            LayoutGridRowMinHeight: =0
            LayoutGridRows: =6
            LayoutMaxHeight: =
            LayoutMaxWidth: =
            LayoutMinHeight: =112
            LayoutMinWidth: =200
            maximumHeight: =11360
            maximumWidth: =640
            PaddingBottom: =5
            PaddingLeft: =5
            PaddingRight: =5
            PaddingTop: =5
            Visible: =cmpNavbarSidebar.Btn1Enabled
            Width: =240
            ZIndex: =1

            icnBtn_Nav_1 As image:
                Height: =cmpNavbarSidebar.IconSize
                HoverFill: =
                Image: |-
                    =If(
                        cmpNavbarSidebar.Btn1Text = cmpNavbarSidebar.CurrentActiveButton,
                        cmpNavbarSidebar.Btn1IconSelected,
                        cmpNavbarSidebar.Btn1Icon
                    )
                ImagePosition: =ImagePosition.Stretch
                OnSelect: |-
                    =cmpNavbarSidebar.Close_ResetNavbarCollapsed();
                    Set(varAnimatedBtn1, true);
                    
                    // Navigation
                    //Navigate(cmpNavbarSidebar.NavToScreen_1, ScreenTransition.None);
                PressedFill: =
                Width: =Self.Height
                X: =7.5
                Y: |-
                    =// Centering function
                    (Parent.Height/2) - (Self.Height/2)
                ZIndex: =1

            bgBtn_Nav_1 As rectangle:
                Fill: =RGBA(0, 0, 0, 0)
                Height: =Parent.Height
                HoverFill: =RGBA(0, 0, 0, 0.1)
                OnSelect: |-
                    =cmpNavbarSidebar.Close_ResetNavbarCollapsed();
                    Set(varAnimatedBtn1, true);
                    
                    // Navigation
                    //Navigate(cmpNavbarSidebar.NavToScreen_1, ScreenTransition.None);
                PressedFill: =RGBA(0, 0, 0, 0.15)
                Width: =Parent.Width
                X: =Parent.Width/2 - Self.Width/2
                Y: =Parent.Height/2 - Self.Height/2
                ZIndex: =2

            btnName_Nav_1 As button:
                Align: =Align.Left
                AutoDisableOnSelect: =false
                BorderThickness: =0
                Fill: |-
                    =If(
                        cmpNavbarSidebar.CurrentActiveButton = cmpNavbarSidebar.Btn1Text,
                        RGBA(0, 0, 0, 0.15),
                        RGBA(0, 0, 0, 0)
                    )
                FocusedBorderThickness: =0
                Font: =Font.'Segoe UI'
                Height: =Parent.Height
                HoverBorderColor: =ColorFade(Self.BorderColor, 5%)
                HoverFill: =RGBA(0, 0, 0, 0.1)
                OnSelect: |+
                    =cmpNavbarSidebar.Close_ResetNavbarCollapsed();
                    
                    // Navigation
                    Navigate(cmpNavbarSidebar.Btn1Navigate, ScreenTransition.None);
                    
                PaddingBottom: =0
                PaddingLeft: |+
                    =(icnBtn_Nav_1.Width + icnBtn_Nav_1.X) * 1.3 + 5
                    
                PaddingRight: =0
                PaddingTop: =0
                PressedColor: =Color.White
                PressedFill: =RGBA(0, 0, 0, 0.15)
                RadiusBottomLeft: =5
                RadiusBottomRight: =5
                RadiusTopLeft: =5
                RadiusTopRight: =5
                Size: =cmpNavbarSidebar.FontSize
                TabIndex: =-1
                Text: =cmpNavbarSidebar.Btn1Text
                Width: =Parent.Width
                ZIndex: =3

        cntNavBtn_2 As groupContainer.manualLayoutContainer:
            DropShadow: =DropShadow.None
            FillPortions: =0
            Height: =40
            LayoutGridColumnMinWidth: =0
            LayoutGridColumns: =6
            LayoutGridRowMinHeight: =0
            LayoutGridRows: =6
            LayoutMaxHeight: =
            LayoutMaxWidth: =
