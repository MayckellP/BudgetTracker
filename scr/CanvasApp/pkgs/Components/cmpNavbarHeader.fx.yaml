                LayoutMinWidth: =250
                maximumHeight: =11360
                maximumWidth: =640
                RadiusBottomLeft: =10
                RadiusBottomRight: =10
                RadiusTopLeft: =10
                RadiusTopRight: =10
                Width: =Parent.Height
                X: =40
                Y: =40
                ZIndex: =5

                cnntBgHamburger_navbarHeader As groupContainer.manualLayoutContainer:
                    Height: |-
                        =If(
                            varAnimationBtnHamburger,
                            Parent.Height * Power(tmrAnimationHamburger_navbarHeader.Value / tmrAnimationHamburger_navbarHeader.Duration, 1.5) + 35
                        )
