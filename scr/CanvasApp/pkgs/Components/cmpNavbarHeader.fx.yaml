                    X: =Parent.Width/2 - Self.Width/2
                    Y: =Parent.Height/2 - Self.Height/2
                    ZIndex: =3

                tmrAnimationHamburger_navbarHeader As timer:
                    Duration: =260
                    Height: =0
                    OnTimerEnd: |-
                        =Set(varAnimationBtnHamburger, false);
                        Reset(Self);
                    Start: =varAnimationBtnHamburger
                    Visible: =false
                    Width: =0
                    ZIndex: =4

