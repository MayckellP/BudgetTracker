                        =If(
                            varAnimationBtnHamburger,
                            Parent.Width * Power(tmrAnimationHamburger_navbarHeader.Value / tmrAnimationHamburger_navbarHeader.Duration, 1.5) + 35
                        )
                    X: =Parent.Width/2 - Self.Width/2
                    Y: =Parent.Height/2 - Self.Height/2
                    ZIndex: =1

                    btnBgHamburger_navbarHeader As rectangle:
                        Fill: =RGBA(0, 0, 0, 0.15 * (1-tmrAnimationHamburger_navbarHeader.Value/tmrAnimationHamburger_navbarHeader.Duration))
                        Height: =Parent.Height
                        HoverFill: =RGBA(0, 0, 0, 0)
                        OnSelect: =Set(varAnimationBtnHamburger, true);
                        PressedFill: =RGBA(0, 0, 0, 0)
                        Width: =Parent.Width
                        X: =Parent.Width/2 - Self.Width/2
                        Y: =Parent.Height/2 - Self.Height/2
                        ZIndex: =1

                icnHamburguer_navbarHeader As image:
                    Height: =Self.Width
                    HoverBorderColor: =Color.Black
                    HoverFill: =If(App.Width > 1500, RGBA(0, 0, 0, 0.1), RGBA(0, 0, 0, 0.0))
                    Image: |-
                        =Switch(
                            cmpNavbarHeader.SidebarActived,
                            true,
                            Icon_HamburgerClosed_White,
                            false,
                            Icon_Hamburger_White,
                            Icon_Hamburger_White
                        )
                    OnSelect: |
                        =Set(varAnimationBtnHamburger, true);
                        cmpNavbarHeader.ShowNavbarSidebar();
                    PressedFill: =If(App.Width > 1500, RGBA(0, 0, 0, 0.1), RGBA(0, 0, 0, 0.0))
                    RadiusBottomLeft: =10
                    RadiusBottomRight: =10
                    RadiusTopLeft: =10
                    RadiusTopRight: =10
                    Tooltip: ="Vorheriger Mitarbeiter"
