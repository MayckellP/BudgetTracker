        tmrBtnBgAnimated_5 As timer:
            Duration: =280
            Height: =0
            OnTimerEnd: |-
                =Set(varBtnAnimated, false);
                Reset(Self);
                cmpButton.OnSelect();
            Start: =varBtnAnimated
