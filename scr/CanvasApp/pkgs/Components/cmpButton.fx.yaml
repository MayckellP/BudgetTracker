        ContBgAnimated_5 As groupContainer.manualLayoutContainer:
            DropShadow: =DropShadow.None
            Height: |-
                =If(
                    varBtnAnimated,
                    Parent.Height * Power(tmrBtnBgAnimated_5.Value / tmrBtnBgAnimated_5.Duration, 1.5) + 35
                )
            LayoutGridColumnMinWidth: =0
            LayoutGridColumns: =6
