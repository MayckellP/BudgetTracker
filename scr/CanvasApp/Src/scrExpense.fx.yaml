scrExpense As screen:
    OnVisible: |-
        =UpdateContext({locSidebarOpened: Blank()});
        Set(gblExpenseStatusByNotify, false);

    cntMain_scrExpense As groupContainer.horizontalAutoLayoutContainer:
        DropShadow: =DropShadow.None
        Height: =App.Height
        LayoutAlignItems: =LayoutAlignItems.Center
        LayoutDirection: =If(varIsMobileView, LayoutDirection.Vertical, LayoutDirection.Horizontal)
        LayoutGridColumnMinWidth: =0
        LayoutGridColumns: =6
        LayoutGridRowMinHeight: =0
        LayoutGridRows: =6
        LayoutMode: =LayoutMode.Auto
        RadiusBottomLeft: =0
        RadiusBottomRight: =0
        RadiusTopLeft: =0
        RadiusTopRight: =0
        Width: =App.Width
        X: =App.Width/2 - Self.Width/2
        Y: =App.Height/2 - Self.Height/2
        ZIndex: =1

        cmpNavbarHeader_scrExpense_Mobile As cmpNavbarHeader:
            FillPortions: =0.34
            HamburguerIconSize: =30
            LayoutMaxHeight: =65
            LayoutMaxWidth: =0
            LayoutMinHeight: =60
            LayoutMinWidth: =640
            ShowNavbarSidebar: |-
                =UpdateContext({locSidebarOpened: !locSidebarOpened});
            SidebarActived: =locSidebarOpened
            TextDetailsColor: =RGBA(214, 221, 224, 1)
            TextDetailsFontSize: =8
            TitleFontSize: =12
            Visible: =varIsMobileView

        cmpSidebar_scrExpense As cmpSidebar:
            AlignInContainer: =AlignInContainer.Stretch
            BackgroundColor: =varDsBGCardContainer
            Btn1Icon: =If(varIsDarkModusActived, Dashboard_Selected, Dashboard_Black)
            Btn1Text: ="Finanz Übersicht"
            Btn2Icon: =If(varIsDarkModusActived, Report_Selected, Report_Black)
            Btn2Navigate: =scrReport
            Btn2Text: ="Berichte"
            Btn2Visible: =gblIsSupervisor
            Btn3Icon: =If(varIsDarkModusActived, Search_Selected, Search_Black)
            Btn3IconSelected: =Search_Selected
            Btn3Navigate: =scrSearch
            Btn3Text: ="Suchen"
            Btn4Icon: |
                =Support_Black
            Btn4Visible: =false
            ChildTabPriority: =true
            ContentLanguage: =""
            EnableChildFocus: =true
            Fill: =RGBA(255, 255, 255, 1)
            FillPortions: =0.8
            FontSize: =varFontSizeButton
            LayoutMaxHeight: =0
            LayoutMaxWidth: =varDsSidebarWidth
            LayoutMinHeight: =640
            LayoutMinWidth: =120
            OnSelectBtnNewRecord: =Set(locModalActived, true)
            PrimaryColor: =varDsColorPrimaryButton
            SelectedPage: ="Finanz Übersicht"
            TextColor: =varDsColorGeneralText
            TitleFontSize: =12
            Visible: =!varIsMobileView
            Width: =varDsSidebarWidth
            ZIndex: =3

