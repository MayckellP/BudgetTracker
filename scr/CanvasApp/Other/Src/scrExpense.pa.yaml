            - cmpNavbarHeader_scrExpense_Mobile:
                Control: CanvasComponent
                ComponentName: cmpNavbarHeader
                ComponentLibraryUniqueName: crb5e_navigation_a8e64
                Properties:
                  BackgroundColor: =RGBA(0, 121, 107, 1)
                  FillPortions: =0.34
                  HamburguerIconSize: =30
                  Height: =80
                  IconRefresh: =SampleImage
                  LayoutMaxHeight: =65
                  LayoutMinHeight: =60
                  MarginContainer: =10
                  PageName: ="Finanz Übersicht"
                  ShowNavbarSidebar: |-
                    =UpdateContext({locSidebarOpened: !locSidebarOpened});
                  SidebarActived: =locSidebarOpened
                  TextDetails: =User().FullName
                  TextDetailsColor: =RGBA(214, 221, 224, 1)
                  TextDetailsFontSize: =8
                  TitleFontSize: =12
                  TitleTextColor: =RGBA(255, 255, 255, 1)
                  Visible: =varIsMobileView
                  Width: =App.Width
