                                                data: "=With(\n    {\n        selectedPeriod: ddPeriode_report.Selected.Value,\n        totalBudget: gblCurrentBudget\n    },\n    \n    With(\n        {\n            baseData:\n                AddColumns(\n                    Filter(\n                        ColMain_Expense,\n                        Department.DepartmentName = gblCurrentDepartment.DepartmentName &&\n                        Year(SubmittedDate) = Year(Today()) &&\n                        ExpenseStatus = 'ExpenseStatus (hh_Expenses)'.Approved\n                    ),\n                    periodIndex,\n                    Switch(\n                        selectedPeriod,\n\n                        \"Jährlich\",\n                        Month(SubmittedDate),\n\n                        \"Halbjährlich\",\n                        If(Month(SubmittedDate) <= 6, 1, 2),\n\n                        \"Vierteljährlich\",\n                        RoundUp(Month(SubmittedDate) / 3, 0)\n                    )\n                ),\n\n            periods:\n                Switch(\n                    selectedPeriod,\n\n                    \"Jährlich\",\n                    AddColumns(\n                        Sequence(12),\n                        name, Text(Date(Year(Today()), Value, 1), \"[$-en-US]mmm\"),\n                        periodIndex, Value\n                    ),\n\n                    \"Halbjährlich\",\n                    AddColumns(\n                        Sequence(2),\n                        name,\n                            If(\n                                Value = 1,\n                                \"H1 (Jan-Jun)\",\n                                \"H2 (Jul-Dec)\"\n                            ),\n                        periodIndex, Value\n                    ),\n\n                    \"Vierteljährlich\",\n                    AddColumns(\n                        Sequence(4),\n                        name, \"Q\" & Value,\n                        periodIndex, Value\n                    )\n                ),\n\n            divisor:\n                Switch(\n                    selectedPeriod,\n                    \"Jährlich\", 12,\n                    \"Halbjährlich\", 2,\n                    \"Vierteljährlich\", 4\n                )\n        },\n\n        JSON(\n            ForAll(\n                periods,\n                With(\n                    {\n                        currentPeriod: periodIndex\n                    },\n                    {\n                        name: name,\n\n                        budget: totalBudget,\n\n                        actual:\n                            Coalesce(\n                                Sum(\n                                    Filter(\n                                        baseData,\n                                        periodIndex = currentPeriod\n                                    ),\n                                    Amount\n                                ),\n                                0\n                            )\n                    }\n                )\n            ),\n            JSONFormat.Compact\n        )\n    )\n)\n\n/*With(\n    {\n        selectedPeriod: ddPeriode_report.Selected.Value,\n        totalBudget: gblCurrentBudget\n    },\n    \n    With(\n        {\n            baseData:\n                AddColumns(\n                    Filter(\n                        ColMain_Expense,\n                        Department.DepartmentName = gblCurrentDepartment.DepartmentName &&\n                        Year(SubmittedDate) = Year(Today()) &&\n                        ExpenseStatus = 'ExpenseStatus (hh_Expenses)'.Approved\n                    ),\n                    periodIndex,\n                    Switch(\n                        selectedPeriod,\n                        \"Jährlich\", Month(SubmittedDate),\n                        \"Halbjährlich\", If(Month(SubmittedDate) <= 6, 1, 2),\n                        \"Vierteljährlich\", RoundUp(Month(SubmittedDate) / 3, 0)\n                    )\n                ),\n\n            periods:\n                Switch(\n                    selectedPeriod,\n\n                    \"Jährlich\",\n                    AddColumns(\n                        Sequence(12),\n                        name, Text(Date(Year(Today()), Value, 1), \"[$-en-US]mmm\"),\n                        periodIndex, Value\n                    ),\n\n                    \"Halbjährlich\",\n                    AddColumns(\n                        Sequence(6),\n                        name, Text(Date(Year(Today()), Value, 1), \"[$-en-US]mmm\"),\n                        periodIndex, Value\n                    ),\n\n                    \"Vierteljährlich\",\n                    AddColumns(\n                        Sequence(4),\n                        name, Text(Date(Year(Today()), Value, 1), \"[$-en-US]mmm\"),\n                        periodIndex, Value\n                    )\n                ),\n\n            divisor:\n                Switch(\n                    selectedPeriod,\n                    \"Jährlich\", 12,\n                    \"Halbjährlich\", 6,\n                    \"Vierteljährlich\", 4\n                )\n        },\n\n        JSON(\n            ForAll(\n    periods,\n    With(\n        {\n            currentPeriod: periodIndex\n        },\n        {\n            name: name,\n            budget: totalBudget,\n            actual:\n                Coalesce(\n                    Sum(\n                        Filter(\n                            baseData,\n                            periodIndex = currentPeriod\n                        ),\n                        Amount\n                    ),\n                    0\n                )\n        }\n    )\n),\n            JSONFormat.Compact\n        )\n    )\n)*/"
